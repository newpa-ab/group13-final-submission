<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">
  <defs>
    <style>
      .bg { fill: #050712; }
      .panel { fill: #0d1220; stroke: #64748b; stroke-width: 2; }
      .panel2 { fill: #090d18; stroke: #22d3ee; stroke-width: 2; }
      .muted { fill: #94a3b8; font-family: Consolas, monospace; font-size: 8px; }
      .small { fill: #e5e7eb; font-family: Consolas, monospace; font-size: 8px; }
      .mid { fill: #f8fafc; font-family: Consolas, monospace; font-size: 14px; font-weight: 700; }
      .title { fill: #f8fafc; font-family: Consolas, monospace; font-size: 22px; font-weight: 800; }
      .cyan { fill: #22d3ee; }
      .red { fill: #ef4444; }
      .violet { fill: #a78bfa; }
      .yellow { fill: #fde68a; }
      .line { stroke: #334155; stroke-width: 1; }
      .cyanLine { stroke: #22d3ee; stroke-width: 2; }
      .redLine { stroke: #ef4444; stroke-width: 2; }
      .whiteLine { stroke: #f8fafc; stroke-width: 1; }
    </style>
  </defs>

  <!-- MAIN MENU -->
  <g transform="translate(10,10)">
    <rect class="bg" width="240" height="240" rx="8"/>
    <rect x="4" y="4" width="232" height="232" rx="6" fill="none" stroke="#1f2937" stroke-width="2"/>
    <text class="title cyan" x="39" y="35">SPACE OPS</text>
    <text class="muted" x="76" y="52">SELECT MISSION</text>

    <rect class="panel2" x="24" y="66" width="192" height="42" rx="4"/>
    <rect x="33" y="78" width="6" height="6" fill="#22d3ee"/>
    <text class="mid" x="48" y="88">ASTEROIDS</text>
    <text class="muted" x="48" y="101">Free flight</text>

    <rect class="panel" x="24" y="118" width="192" height="42" rx="4"/>
    <rect x="33" y="130" width="6" height="6" fill="#64748b"/>
    <text class="mid" x="48" y="140">STRIKER</text>
    <text class="muted" x="48" y="153">Vertical shoot</text>

    <rect class="panel" x="18" y="170" width="96" height="20" rx="4"/>
    <text class="muted" x="28" y="183">AST BEST</text>
    <text class="small" x="82" y="183">320</text>
    <rect class="panel" x="126" y="170" width="96" height="20" rx="4"/>
    <text class="muted" x="136" y="183">STK BEST</text>
    <text class="small" x="190" y="183">560</text>

    <text class="small" x="62" y="207">JOY UP/DOWN</text>
    <text class="yellow" x="42" y="225" style="font-family:Consolas,monospace;font-size:8px;font-weight:700;">BTN2 NEXT</text>
    <text class="muted" x="140" y="225">BTN3 BACK</text>
  </g>

  <!-- SHIP SELECT -->
  <g transform="translate(270,10)">
    <rect class="bg" width="240" height="240" rx="8"/>
    <rect x="4" y="4" width="232" height="232" rx="6" fill="none" stroke="#1f2937" stroke-width="2"/>
    <text class="title cyan" x="21" y="33">SELECT SHIP</text>
    <text class="muted" x="80" y="52">ASTEROIDS MODE</text>

    <text class="title muted" x="38" y="108">&lt;</text>
    <text class="title muted" x="190" y="108">&gt;</text>
    <rect class="panel2" x="72" y="62" width="96" height="82" rx="4"/>
    <line class="line" x1="84" y1="75" x2="156" y2="75"/>
    <line class="line" x1="84" y1="132" x2="156" y2="132"/>
    <polygon points="120,78 139,124 120,113 101,124" fill="#cbd5e1" stroke="#22d3ee" stroke-width="2"/>
    <polygon points="120,82 129,116 120,110 111,116" fill="#ef4444"/>
    <text class="mid red" x="96" y="164">RAIL</text>

    <rect class="panel" x="22" y="174" width="196" height="34" rx="4"/>
    <text class="muted" x="32" y="186">WEAPON</text><text class="small" x="84" y="186">High damage</text>
    <text class="muted" x="32" y="198">ROLE</text><text class="small" x="84" y="198">Boss damage</text>
    <text class="muted" x="32" y="210">BEST</text><text class="small" x="84" y="210">Heavy target</text>

    <text class="small" x="44" y="224">JOY L/R</text>
    <text class="yellow" x="104" y="224" style="font-family:Consolas,monospace;font-size:8px;font-weight:700;">BTN2 START</text>
    <text class="muted" x="86" y="236">BTN3 BACK</text>
  </g>

  <!-- GAME HUD -->
  <g transform="translate(10,270)">
    <rect class="bg" width="240" height="240" rx="8"/>
    <rect x="4" y="4" width="232" height="232" rx="6" fill="none" stroke="#1f2937" stroke-width="2"/>
    <rect class="panel" x="6" y="5" width="76" height="20" rx="4"/>
    <text class="muted" x="14" y="18">HP</text>
    <rect x="32" y="12" width="42" height="6" fill="#111827" stroke="#64748b" stroke-width="1"/>
    <rect x="34" y="14" width="30" height="2" fill="#22d3ee"/>
    <rect class="panel" x="92" y="5" width="44" height="20" rx="4"/>
    <text class="small" x="102" y="18">W:3</text>
    <rect class="panel" x="146" y="5" width="88" height="20" rx="4"/>
    <text class="small" x="156" y="18">S:320</text>

    <circle cx="120" cy="118" r="16" fill="none" stroke="#334155" stroke-width="1"/>
    <polygon points="120,95 134,132 120,124 106,132" fill="#cbd5e1" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="70" cy="86" r="11" fill="none" stroke="#fde68a" stroke-width="2"/>
    <circle cx="170" cy="130" r="8" fill="none" stroke="#fde68a" stroke-width="2"/>
    <text class="muted" x="70" y="165">gameplay clear area</text>

    <rect class="panel" x="6" y="218" width="54" height="17" rx="4"/>
    <text class="small" x="14" y="230">2X</text>
    <rect x="31" y="225" width="22" height="4" fill="#111827" stroke="#64748b" stroke-width="1"/>
    <rect class="panel" x="68" y="218" width="56" height="17" rx="4"/>
    <text class="small" x="75" y="230">MAG</text>
    <rect x="98" y="225" width="18" height="4" fill="#111827" stroke="#64748b" stroke-width="1"/>
    <rect class="panel" x="180" y="218" width="54" height="17" rx="4"/>
    <text class="small" x="194" y="230">SHD</text>
  </g>

  <!-- GAME OVER -->
  <g transform="translate(270,270)">
    <rect class="bg" width="240" height="240" rx="8"/>
    <rect x="4" y="4" width="232" height="232" rx="6" fill="none" stroke="#1f2937" stroke-width="2"/>
    <text class="title red" x="39" y="58">GAME OVER</text>
    <rect class="panel" x="42" y="88" width="156" height="90" rx="4"/>
    <text class="muted" x="58" y="106">MODE:</text><text class="small" x="112" y="106">STRIKER</text>
    <line class="line" x1="54" y1="116" x2="186" y2="116"/>
    <text class="muted" x="58" y="130">SHIP:</text><text class="small" x="112" y="130">RAIL</text>
    <line class="line" x1="54" y1="140" x2="186" y2="140"/>
    <text class="muted" x="58" y="154">SCORE:</text><text class="small" x="112" y="154">320</text>
    <text class="muted" x="58" y="168">BEST:</text><text class="small" x="112" y="168">560</text>
    <text class="yellow" x="72" y="207" style="font-family:Consolas,monospace;font-size:8px;font-weight:700;">BTN2/BTN3: MENU</text>
  </g>
</svg>
